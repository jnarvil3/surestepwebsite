server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    # Clean URLs for case studies (no .html extension)
    location /case-studies/ {
        try_files $uri $uri.html $uri/ =404;
    }

    # Clean URLs for blog posts (no .html extension)
    location /blog/ {
        try_files $uri $uri.html $uri/ =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location = /404.html {
        internal;
    }
}
